<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=/fitness/">
    <title>Creativzlab® - Redirecionando...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-bg: #060b0f;
            --teal: #00AEEF;
            --white: #ffffff;
            --text-muted: #64748b;
        }
        body {
            margin: 0;
            padding: 24px;
            background-color: var(--dark-bg);
            color: var(--white);
            font-family: 'Google Sans Flex', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            max-width: 480px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: var(--teal);
            margin-bottom: 24px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 174, 239, 0.1);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
            display: inline-block;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        a {
            color: var(--teal);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: opacity 0.2s ease;
        }
        a:hover {
            opacity: 0.8;
        }
    </style>
    <script type="text/javascript">
        // Instant javascript-based redirection
        window.location.replace("/fitness/");
    </script>
</head>
<body>
    <div class="container">
        <div class="logo">Creativzlab®</div>
        <div class="spinner"></div>
        <h1>Redirecionando...</h1>
        <p>Estamos te levando para a página da Creativzlab® Fitness.</p>
        <a href="/fitness/">Clique aqui se não for redirecionado automaticamente</a>
    </div>
</body>
</html>
